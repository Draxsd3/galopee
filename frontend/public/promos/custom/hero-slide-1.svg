<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Tudo o que voce procura num so lugar">
  <defs>
    <linearGradient id="s1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="s1gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f1c56a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#s1bg)"/>

  <circle cx="1480" cy="120" r="260" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="700" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="1380" cy="640" r="100" fill="#f1c56a" opacity="0.18"/>

  <g fill="#ffffff" opacity="0.4">
    <circle cx="220" cy="180" r="3"/>
    <circle cx="380" cy="120" r="4"/>
    <circle cx="900" cy="80" r="3"/>
    <circle cx="1100" cy="160" r="4"/>
    <circle cx="500" cy="700" r="3"/>
    <circle cx="700" cy="740" r="4"/>
  </g>

  <g transform="translate(870, 200)" stroke="#f1c56a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <line x1="-14" y1="0" x2="14" y2="0"/>
    <line x1="0" y1="-14" x2="0" y2="14"/>
  </g>

  <!-- Floating product cards (representando diversidade de categorias) -->
  <g transform="translate(940, 130)">
    <!-- card 1: smartphone -->
    <g transform="translate(0, 0) rotate(-6)">
      <rect x="0" y="0" width="120" height="180" rx="18" fill="#ffffff"/>
      <rect x="14" y="14" width="92" height="118" rx="10" fill="#1e1b4b"/>
      <circle cx="60" cy="73" r="22" fill="#6366f1"/>
      <rect x="36" y="148" width="48" height="6" rx="3" fill="#1e1b4b" opacity="0.6"/>
      <rect x="46" y="160" width="28" height="4" rx="2" fill="#1e1b4b" opacity="0.4"/>
    </g>
    <!-- card 2: shopping bag -->
    <g transform="translate(180, 50) rotate(8)">
      <rect x="0" y="0" width="140" height="160" rx="20" fill="url(#s1gold)"/>
      <path d="M 32 50 Q 32 22 70 22 Q 108 22 108 50" fill="none" stroke="#1e1b4b" stroke-width="6" stroke-linecap="round"/>
      <text x="70" y="115" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="56" font-weight="900" fill="#1e1b4b">G</text>
    </g>
    <!-- card 3: book -->
    <g transform="translate(380, 0) rotate(-3)">
      <rect x="0" y="0" width="120" height="180" rx="14" fill="#a5b4fc"/>
      <rect x="0" y="0" width="14" height="180" rx="6" fill="#4338ca"/>
      <rect x="34" y="40" width="68" height="6" rx="3" fill="#1e1b4b" opacity="0.65"/>
      <rect x="34" y="55" width="50" height="4" rx="2" fill="#1e1b4b" opacity="0.4"/>
      <rect x="34" y="130" width="40" height="6" rx="3" fill="#1e1b4b" opacity="0.6"/>
    </g>
    <!-- card 4: clothes hanger -->
    <g transform="translate(560, 60) rotate(5)">
      <rect x="0" y="20" width="130" height="140" rx="14" fill="#ffffff"/>
      <path d="M 65 -8 a 14 14 0 1 1 -14 14 L 51 22 L 12 56 L 118 56 L 79 22 L 79 6" fill="none" stroke="#1e1b4b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 24 64 L 36 130 L 94 130 L 106 64 Z" fill="#6366f1" opacity="0.85"/>
    </g>
  </g>

  <!-- Title block -->
  <g transform="translate(120, 260)">
    <rect x="0" y="0" width="6" height="56" rx="3" fill="#f1c56a"/>
    <text x="22" y="46" font-family="Manrope, system-ui, sans-serif" font-size="42" font-weight="700" fill="#f1c56a" letter-spacing="2">GALOPEE MARKETPLACE</text>
    <text x="0" y="170" font-family="Manrope, system-ui, sans-serif" font-size="118" font-weight="900" fill="#ffffff" letter-spacing="-3">Tudo num só</text>
    <text x="0" y="290" font-family="Manrope, system-ui, sans-serif" font-size="118" font-weight="900" fill="#ffffff" letter-spacing="-3">lugar.</text>
    <text x="345" y="290" font-family="Manrope, system-ui, sans-serif" font-size="118" font-weight="900" fill="#f1c56a" letter-spacing="-3">Pra você.</text>
    <text x="0" y="370" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="500" fill="#ffffff" opacity="0.9">10 categorias, milhares de produtos, com entrega para todo o Brasil.</text>
  </g>
</svg>
