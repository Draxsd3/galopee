<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Frete gratis em milhares de produtos">
  <defs>
    <linearGradient id="s2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#s2bg)"/>

  <circle cx="1450" cy="160" r="240" fill="#ffffff" opacity="0.08"/>
  <circle cx="180" cy="690" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- map dotted path -->
  <g stroke="#f1c56a" stroke-width="3" stroke-dasharray="4 12" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 80 200 Q 360 360 660 280 T 1200 380"/>
  </g>
  <g fill="#f1c56a">
    <circle cx="80" cy="200" r="8"/>
    <circle cx="1200" cy="380" r="8"/>
    <circle cx="1200" cy="380" r="14" fill="none" stroke="#f1c56a" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Truck illustration -->
  <g transform="translate(140, 380)">
    <!-- shadow -->
    <ellipse cx="220" cy="290" rx="240" ry="14" fill="#000000" opacity="0.25"/>
    <!-- cargo box -->
    <rect x="0" y="20" width="290" height="210" rx="16" fill="#ffffff"/>
    <!-- box stripe -->
    <rect x="0" y="120" width="290" height="14" fill="#f1c56a"/>
    <!-- door divider -->
    <line x1="145" y1="40" x2="145" y2="210" stroke="#a5b4fc" stroke-width="4" stroke-linecap="round"/>
    <!-- handles -->
    <circle cx="120" cy="145" r="4" fill="#1e1b4b"/>
    <circle cx="170" cy="145" r="4" fill="#1e1b4b"/>
    <!-- cabin -->
    <path d="M 290 100 L 410 100 L 440 230 L 290 230 Z" fill="#e0e7ff"/>
    <rect x="305" y="120" width="100" height="70" rx="6" fill="#1e1b4b"/>
    <rect x="312" y="127" width="20" height="20" rx="3" fill="#a5b4fc" opacity="0.8"/>
    <!-- wheels -->
    <circle cx="80" cy="250" r="42" fill="#1e1b4b"/>
    <circle cx="80" cy="250" r="20" fill="#a5b4fc"/>
    <circle cx="380" cy="250" r="42" fill="#1e1b4b"/>
    <circle cx="380" cy="250" r="20" fill="#a5b4fc"/>
    <!-- speed lines -->
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="-70" y1="80" x2="-15" y2="80" opacity="0.7"/>
      <line x1="-100" y1="130" x2="-25" y2="130" opacity="0.5"/>
      <line x1="-60" y1="180" x2="-20" y2="180" opacity="0.6"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(680, 240)">
    <g>
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#f1c56a"/>
      <text x="90" y="30" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1e1b4b" letter-spacing="2">PROMOÇÃO</text>
    </g>
    <text x="0" y="130" font-family="Manrope, system-ui, sans-serif" font-size="118" font-weight="900" fill="#ffffff" letter-spacing="-4">FRETE</text>
    <text x="0" y="250" font-family="Manrope, system-ui, sans-serif" font-size="148" font-weight="900" fill="#f1c56a" letter-spacing="-5">GRÁTIS</text>
    <text x="0" y="320" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="500" fill="#ffffff" opacity="0.9">em milhares de produtos selecionados.</text>
    <text x="0" y="362" font-family="Manrope, system-ui, sans-serif" font-size="22" font-weight="500" fill="#ffffff" opacity="0.7">Para todas as regiões do Brasil.</text>
  </g>
</svg>
