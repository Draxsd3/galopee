      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#bg3)"/>
  <circle cx="200" cy="200" r="250" fill="#fff7ed" opacity="0.08"/>
