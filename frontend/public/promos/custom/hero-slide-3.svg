<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Mega Ofertas ate 50% OFF">
  <defs>
    <linearGradient id="s3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#s3bg)"/>

  <!-- Burst radiating from center-left -->
  <g transform="translate(220, 400)">
    <g opacity="0.18">
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4"/>
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4" transform="rotate(30)"/>
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4" transform="rotate(60)"/>
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4" transform="rotate(90)"/>
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4" transform="rotate(120)"/>
      <path d="M -260 0 L 260 0" stroke="#fff7ed" stroke-width="4" transform="rotate(150)"/>
    </g>
  </g>

  <!-- Sale badge / star burst -->
  <g transform="translate(220, 400) rotate(-12)">
    <!-- star burst shape -->
    <path d="M 0 -180 L 30 -120 L 100 -150 L 90 -80 L 170 -70 L 110 -20 L 150 50 L 80 40 L 80 110 L 30 70 L 0 150 L -30 70 L -80 110 L -80 40 L -150 50 L -110 -20 L -170 -70 L -90 -80 L -100 -150 L -30 -120 Z"
          fill="#1e1b4b"/>
    <circle cx="0" cy="0" r="120" fill="#1e1b4b"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#f1c56a" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="36" font-weight="700" fill="#f1c56a" letter-spacing="2">SUPER</text>
    <text x="0" y="35" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="56" font-weight="900" fill="#ffffff">OFERTAS</text>
  </g>

  <!-- decorative tags -->
  <g transform="translate(1300, 220) rotate(15)">
    <path d="M 0 0 L 110 0 L 150 50 L 110 100 L 0 100 Z" fill="#1e1b4b"/>
    <circle cx="20" cy="50" r="8" fill="#fff7ed"/>
    <text x="80" y="60" text-anchor="middle" font-family="Manrope, sans-serif" font-size="26" font-weight="900" fill="#f1c56a">SALE</text>
  </g>
  <g transform="translate(1340, 600) rotate(-8)">
    <path d="M 0 0 L 110 0 L 150 50 L 110 100 L 0 100 Z" fill="#fff7ed"/>
    <circle cx="20" cy="50" r="8" fill="#dc2626"/>
    <text x="80" y="60" text-anchor="middle" font-family="Manrope, sans-serif" font-size="22" font-weight="900" fill="#dc2626">PROMO</text>
  </g>

  <!-- Main 50% OFF -->
  <g transform="translate(540, 240)">
    <text x="0" y="0" font-family="Manrope, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff">ATÉ</text>
    <text x="0" y="240" font-family="Manrope, system-ui, sans-serif" font-size="280" font-weight="900" fill="#ffffff" letter-spacing="-12">50%</text>
    <text x="500" y="240" font-family="Manrope, system-ui, sans-serif" font-size="180" font-weight="900" fill="#f1c56a" letter-spacing="-6">OFF</text>
    <text x="0" y="320" font-family="Manrope, system-ui, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.95">em produtos de todas as 10 categorias</text>
  </g>
</svg>
