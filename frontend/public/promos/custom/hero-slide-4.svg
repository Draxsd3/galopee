<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="12x sem juros em todas as compras">
  <defs>
    <linearGradient id="s4bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0d2c"/>
    </linearGradient>
    <linearGradient id="s4card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f1c56a"/>
      <stop offset="100%" stop-color="#c19042"/>
    </linearGradient>
    <linearGradient id="s4card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#s4bg)"/>

  <circle cx="1500" cy="100" r="280" fill="#f1c56a" opacity="0.06"/>
  <circle cx="100" cy="700" r="240" fill="#6366f1" opacity="0.18"/>
  <circle cx="1380" cy="660" r="120" fill="#a5b4fc" opacity="0.12"/>

  <!-- Background card (behind, tilted opposite) -->
  <g transform="translate(870, 280) rotate(8)">
    <rect x="0" y="0" width="500" height="300" rx="24" fill="url(#s4card2)" opacity="0.6"/>
  </g>

  <!-- Foreground gold card -->
  <g transform="translate(940, 230) rotate(-8)">
    <rect x="0" y="0" width="520" height="320" rx="26" fill="url(#s4card)"/>
    <!-- subtle shine -->
    <path d="M 0 80 Q 260 40 520 100 L 520 320 L 0 320 Z" fill="#000000" opacity="0.06"/>
    <!-- chip -->
    <rect x="40" y="80" width="78" height="60" rx="11" fill="#1e1b4b" opacity="0.85"/>
    <g stroke="#f1c56a" stroke-width="2" fill="none" opacity="0.55" transform="translate(40, 80)">
      <line x1="0" y1="20" x2="78" y2="20"/>
      <line x1="0" y1="40" x2="78" y2="40"/>
      <line x1="20" y1="0" x2="20" y2="60"/>
      <line x1="58" y1="0" x2="58" y2="60"/>
    </g>
    <!-- contactless waves -->
    <g transform="translate(450, 70)" stroke="#1e1b4b" stroke-width="3" fill="none" opacity="0.7">
      <path d="M0 25 a25 25 0 0 1 0 -50"/>
      <path d="M-15 20 a15 15 0 0 1 0 -40"/>
      <path d="M-30 15 a8 8 0 0 1 0 -30"/>
    </g>
    <!-- card number -->
    <text x="40" y="200" font-family="monospace" font-size="34" font-weight="700" fill="#1e1b4b" opacity="0.85" letter-spacing="6">**** **** **** 0420</text>
    <!-- name -->
    <text x="40" y="265" font-family="monospace" font-size="20" font-weight="600" fill="#1e1b4b" opacity="0.7" letter-spacing="2">GALOPEE MEMBER</text>
    <text x="380" y="265" font-family="monospace" font-size="20" font-weight="600" fill="#1e1b4b" opacity="0.7">12/29</text>
  </g>

  <!-- Text -->
  <g transform="translate(120, 240)">
    <rect x="0" y="0" width="6" height="56" rx="3" fill="#f1c56a"/>
    <text x="22" y="46" font-family="Manrope, system-ui, sans-serif" font-size="40" font-weight="700" fill="#f1c56a" letter-spacing="2">PARCELE EM</text>
    <text x="0" y="200" font-family="Manrope, system-ui, sans-serif" font-size="220" font-weight="900" fill="#f1c56a" letter-spacing="-8">12x</text>
    <text x="0" y="290" font-family="Manrope, system-ui, sans-serif" font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-2">sem juros</text>
    <text x="0" y="350" font-family="Manrope, system-ui, sans-serif" font-size="30" font-weight="500" fill="#ffffff" opacity="0.85">em todas as compras com cartão de crédito</text>
  </g>
</svg>
