<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Galopee Pontos: acumule pontos a cada compra e troque por benefícios">
  <defs>
    <linearGradient id="ptbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#ptbg)"/>
  <g fill="#f1c56a" opacity="0.18">
    <circle cx="1300" cy="150" r="6"/>
    <circle cx="1450" cy="280" r="9"/>
    <circle cx="1380" cy="500" r="5"/>
    <circle cx="1500" cy="700" r="7"/>
    <circle cx="200" cy="800" r="5"/>
    <circle cx="900" cy="120" r="4"/>
  </g>
  <g transform="translate(1280, 450)">
    <circle cx="0" cy="0" r="220" fill="#f1c56a"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="Manrope, sans-serif" font-size="240" font-weight="900" fill="#1e1b4b">★</text>
  </g>
  <g transform="translate(120, 360)">
    <text x="0" y="0" font-family="Manrope, sans-serif" font-size="56" font-weight="700" fill="#f1c56a" letter-spacing="2">GALOPEE</text>
    <text x="0" y="130" font-family="Manrope, sans-serif" font-size="160" font-weight="900" fill="#ffffff" letter-spacing="-4">PONTOS</text>
    <text x="0" y="200" font-family="Manrope, sans-serif" font-size="34" font-weight="500" fill="#ffffff" opacity="0.9">Acumule a cada compra e troque por benefícios</text>
    <rect x="0" y="230" width="180" height="6" rx="3" fill="#f1c56a"/>
  </g>
</svg>
