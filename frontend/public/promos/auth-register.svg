<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Crie sua conta Galopee">
  <defs>
    <linearGradient id="regbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="bagfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f1c56a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1100" fill="url(#regbg)"/>

  <!-- Decorative bg circles -->
  <circle cx="800" cy="180" r="240" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="950" r="260" fill="#ffffff" opacity="0.06"/>
  <circle cx="160" cy="200" r="90" fill="#f1c56a" opacity="0.15"/>

  <!-- Floating dots -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="700" cy="500" r="4"/>
    <circle cx="200" cy="450" r="3"/>
    <circle cx="750" cy="380" r="3"/>
    <circle cx="250" cy="600" r="4"/>
    <circle cx="600" cy="700" r="3"/>
    <circle cx="180" cy="350" r="4"/>
    <circle cx="640" cy="250" r="5"/>
  </g>

  <!-- Sparkles for "novo" -->
  <g stroke="#f1c56a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.75">
    <g transform="translate(220, 320)">
      <line x1="-14" y1="0" x2="14" y2="0"/>
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/>
      <line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
    <g transform="translate(680, 270)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <g transform="translate(720, 580)">
      <line x1="-8" y1="0" x2="8" y2="0"/>
      <line x1="0" y1="-8" x2="0" y2="8"/>
    </g>
  </g>

  <!-- Big shopping bag in center-upper -->
  <g transform="translate(450, 540)">
    <!-- bag body -->
    <path d="M -160 -60 L 160 -60 L 180 280 L -180 280 Z" fill="url(#bagfill)"/>
    <!-- bag inner stroke -->
    <path d="M -140 -45 L 140 -45 L 160 265 L -160 265 Z" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <!-- bag handles -->
    <path d="M -90 -55 Q -90 -160 0 -160 Q 90 -160 90 -55"
          fill="none" stroke="url(#bagfill)" stroke-width="22" stroke-linecap="round"/>
    <path d="M -90 -55 Q -90 -160 0 -160 Q 90 -160 90 -55"
          fill="none" stroke="#1e1b4b" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
    <!-- G monogram on bag -->
    <text x="0" y="160" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="180" font-weight="900" fill="#1e1b4b" opacity="0.85">G</text>
    <!-- shadow -->
    <ellipse cx="0" cy="305" rx="180" ry="14" fill="#000000" opacity="0.2"/>
  </g>

  <!-- Geometric accent rectangles -->
  <g opacity="0.18" fill="#ffffff">
    <rect x="70" y="860" width="100" height="3" rx="1.5"/>
    <rect x="70" y="880" width="60" height="3" rx="1.5"/>
    <rect x="720" y="800" width="120" height="3" rx="1.5"/>
    <rect x="720" y="820" width="80" height="3" rx="1.5"/>
  </g>
</svg>
