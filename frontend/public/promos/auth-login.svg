<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Acesse sua conta Galopee">
  <defs>
    <linearGradient id="loginbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="keyglow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f1c56a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1100" fill="url(#loginbg)"/>

  <!-- Decorative bg shapes -->
  <circle cx="100" cy="120" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="800" cy="900" r="280" fill="#ffffff" opacity="0.05"/>
  <circle cx="780" cy="180" r="80" fill="#f1c56a" opacity="0.18"/>

  <!-- Floating dots -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="120" cy="500" r="4"/>
    <circle cx="200" cy="350" r="3"/>
    <circle cx="700" cy="400" r="5"/>
    <circle cx="650" cy="550" r="3"/>
    <circle cx="180" cy="700" r="4"/>
    <circle cx="550" cy="280" r="3"/>
    <circle cx="350" cy="180" r="4"/>
  </g>

  <!-- Sparkles -->
  <g stroke="#f1c56a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7">
    <g transform="translate(170, 250)">
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="0" y1="-12" x2="0" y2="12"/>
    </g>
    <g transform="translate(720, 600)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <g transform="translate(620, 250)">
      <line x1="-8" y1="0" x2="8" y2="0"/>
      <line x1="0" y1="-8" x2="0" y2="8"/>
    </g>
  </g>

  <!-- Big golden key in center-upper -->
  <g transform="translate(450, 470)">
    <!-- key bow (head) -->
    <circle cx="0" cy="-100" r="140" fill="url(#keyglow)"/>
    <circle cx="0" cy="-100" r="115" fill="none" stroke="#1e1b4b" stroke-width="6" opacity="0.4"/>
    <circle cx="0" cy="-100" r="60" fill="#1e1b4b"/>
    <circle cx="0" cy="-100" r="42" fill="url(#keyglow)"/>
    <!-- key shaft -->
    <rect x="-22" y="40" width="44" height="280" rx="6" fill="url(#keyglow)"/>
    <!-- key teeth -->
    <rect x="22" y="220" width="50" height="35" rx="4" fill="url(#keyglow)"/>
    <rect x="22" y="280" width="35" height="35" rx="4" fill="url(#keyglow)"/>
    <!-- shadow under key -->
    <ellipse cx="0" cy="345" rx="80" ry="10" fill="#000000" opacity="0.18"/>
  </g>

  <!-- Geometric accent rectangles -->
  <g opacity="0.18" fill="#ffffff">
    <rect x="60" y="850" width="80" height="3" rx="1.5"/>
    <rect x="60" y="870" width="50" height="3" rx="1.5"/>
    <rect x="730" y="780" width="100" height="3" rx="1.5"/>
    <rect x="730" y="800" width="60" height="3" rx="1.5"/>
  </g>
</svg>
